services:
  omnilux:
    image: ${OMNILUX_IMAGE:-ghcr.io/omnilux-tv/omnilux:latest}
    pull_policy: always
    container_name: omnilux
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
      - "1900:1900/udp"   # DLNA/SSDP discovery
    security_opt:
      - no-new-privileges:true
    volumes:
      # Persistent database and config
      - omnilux-data:/app/data
      # Persistent installed plugins
      - omnilux-plugins:/app/plugins
      # Media library root — read-write needed for transcoding temp files
      - ${LIBRARY_ROOT:-/mnt/media}:/data
    environment:
      - PORT=4000
      - NODE_ENV=production
      - OMNILUX_DB_PATH=/app/data/omnilux.db
      - OMNILUX_PLUGINS_DIR=/app/plugins
      - OMNILUX_LIBRARY_ROOT=/data
      - OMNILUX_DEPLOYMENT_PROFILE=${OMNILUX_DEPLOYMENT_PROFILE:-self-hosted}
      - OMNILUX_PRIMARY_DEPLOYMENT=${OMNILUX_PRIMARY_DEPLOYMENT:-docker-compose}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Optional OmniLux Cloud metadata/link features. Leave blank for local-only/offline installs.
      - SUPABASE_URL=${SUPABASE_URL:-https://api.omnilux.tv}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - OMNILUX_CLOUD_METADATA_BROKER_TOKEN=${OMNILUX_CLOUD_METADATA_BROKER_TOKEN:-}
      - OMNILUX_ENTITLEMENT_LEASE_PUBLIC_KEY_SPKI_B64URL=${OMNILUX_ENTITLEMENT_LEASE_PUBLIC_KEY_SPKI_B64URL:-}
      - OMNILUX_ALLOW_UNSIGNED_ENTITLEMENT_LEASES=${OMNILUX_ALLOW_UNSIGNED_ENTITLEMENT_LEASES:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
    networks:
      - omnilux-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  omnilux-data:
  omnilux-plugins:

networks:
  omnilux-net:
    driver: bridge
