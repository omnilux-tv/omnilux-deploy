# OmniLux — Docker Compose example
# Copy this file and customize for your environment:
#   cp docker-compose.example.yml docker-compose.yml
#
# Then run:
#   docker compose pull && docker compose up -d

services:
  omnilux:
    image: ${OMNILUX_IMAGE:-ghcr.io/omnilux-tv/omnilux:latest}
    pull_policy: always
    container_name: omnilux
    restart: unless-stopped
    ports:
      - "4000:4000"          # Web UI + API
      - "1900:1900/udp"      # DLNA/SSDP discovery
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      PORT: 4000
      OMNILUX_LIBRARY_ROOT: /data
      OMNILUX_DB_PATH: /app/data/omnilux.db
      OMNILUX_PLUGINS_DIR: /app/plugins
      OMNILUX_DOWNLOAD_PATH: /app/data/downloads
      # Optional OmniLux Cloud features. Claim/link a server from the app before expecting cloud metadata.
      # SUPABASE_URL: https://api.omnilux.tv
      # SUPABASE_ANON_KEY: ""
      # OMNILUX_CLOUD_METADATA_BROKER_TOKEN: ""
      # Required for production cloud-linked entitlement checks.
      # OMNILUX_ENTITLEMENT_LEASE_PUBLIC_KEY_SPKI_B64URL: ""
      # OMNILUX_ALLOW_UNSIGNED_ENTITLEMENT_LEASES: "false"
      OMNILUX_DEPLOYMENT_PROFILE: ${OMNILUX_DEPLOYMENT_PROFILE:-self-hosted}
      OMNILUX_PRIMARY_DEPLOYMENT: ${OMNILUX_PRIMARY_DEPLOYMENT:-docker-compose}
      # OMNILUX_PUBLIC_ORIGIN: https://your-omnilux-domain.example
      # OMNILUX_CLOUD_APP_URL: https://app.omnilux.tv
      # OMNILUX_ALLOWED_ORIGINS: https://your-omnilux-domain.example
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    volumes:
      # Persistent app data (SQLite DB, downloads, config)
      - /path/to/omnilux/data:/app/data
      # Persistent plugin store (installed plugins and their shipped assets)
      - /path/to/omnilux/plugins:/app/plugins
      # Shared media library root (your movies, tv, music, etc.)
      - /path/to/media:/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Container stdout/stderr logs stay on the host under Docker's json-file storage,
    # typically /var/lib/docker/containers/<container-id>/<container-id>-json.log.
    # Structured application logs are also written inside the bind mount at:
    #   /path/to/omnilux/data/logs/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    ## GPU acceleration (optional) — uncomment for NVIDIA hardware transcoding
