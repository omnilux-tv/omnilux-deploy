replicaCount: 1

image:
  repository: ghcr.io/omnilux-tv/omnilux
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: omnilux.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  data:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  media:
    enabled: true
    existingClaim: ""
    mountPath: /data

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 4000m
    memory: 4Gi

env:
  PORT: "4000"
  NODE_ENV: "production"

gpu:
  enabled: false
  nvidia:
    count: 1

vpn:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
