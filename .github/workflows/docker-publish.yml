name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/omnilux-tv/omnilux

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Check out deploy repo
        uses: actions/checkout@v4
        with:
          path: omnilux-deploy

      - name: Check out product repo
        uses: actions/checkout@v4
        with:
          repository: omnilux-tv/omnilux
          path: omnilux

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble build context
        run: |
          rsync -a --delete omnilux/ build-context/
          rsync -a --delete omnilux-deploy/docker/ build-context/docker/
          rsync -a --delete omnilux-deploy/deploy/ build-context/deploy/
          rsync -a --delete omnilux-deploy/scripts/ build-context/scripts/
          cp omnilux-deploy/docker-compose.truenas.yml build-context/docker-compose.truenas.yml

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: build-context
          file: build-context/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
