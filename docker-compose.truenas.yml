services:
  # ---------------------------------------------------------------------------
  # Main application — self-hosted OmniLux server
  # ---------------------------------------------------------------------------
  omnilux:
    image: ${OMNILUX_IMAGE:-ghcr.io/omnilux-tv/omnilux:latest}
    container_name: omnilux
    restart: unless-stopped
    pull_policy: always
    runtime: nvidia
    cap_add:
      - NET_ADMIN
    group_add:
      - "44"    # video group for /dev/dri GPU access
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "38400:4000"
      - "1900:1900/udp"   # DLNA/SSDP discovery
    environment:
      NODE_ENV: production
      PORT: 4000
      OMNILUX_LIBRARY_ROOT: /data
      OMNILUX_DB_PATH: /app/data/omnilux.db
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - ${OMNILUX_STORAGE_ROOT:-/mnt/Storage/Applications/OmniLux}/data:/app/data
      - ${OMNILUX_MEDIA_ROOT:-/mnt/media}:/data
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  default:
    external: true
    name: omnilux_default
