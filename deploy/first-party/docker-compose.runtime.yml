services:
  omnilux:
    image: ${OMNILUX_IMAGE:-ghcr.io/omnilux-tv/omnilux:latest}
    container_name: ${OMNILUX_CONTAINER_NAME:-omnilux-runtime}
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${OMNILUX_BIND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      OMNILUX_DISABLE_BACKGROUND_RUNTIME: ${OMNILUX_DISABLE_BACKGROUND_RUNTIME:-false}
      OMNILUX_LIBRARY_ROOT: /data
      OMNILUX_DB_PATH: /app/data/omnilux.db
      SUPABASE_URL: ${SUPABASE_URL:-https://api.omnilux.tv}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      MANAGED_RUNTIME_REGISTRATION_SECRET: ${MANAGED_RUNTIME_REGISTRATION_SECRET:-}
      OMNILUX_MANAGED_RUNTIME_REGISTRATION_SECRET: ${OMNILUX_MANAGED_RUNTIME_REGISTRATION_SECRET:-}
      OMNILUX_DEPLOYMENT_PROFILE: ${OMNILUX_DEPLOYMENT_PROFILE:-self-hosted}
      OMNILUX_PUBLIC_ORIGIN: ${OMNILUX_PUBLIC_ORIGIN:-}
      OMNILUX_CLOUD_APP_URL: ${OMNILUX_CLOUD_APP_URL:-https://app.omnilux.tv}
      OMNILUX_ALLOWED_ORIGINS: ${OMNILUX_ALLOWED_ORIGINS:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    volumes:
      - ${OMNILUX_DATA_ROOT:-/srv/omnilux/data}:/app/data
      - ${OMNILUX_LIBRARY_ROOT:-/srv/omnilux/library}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
