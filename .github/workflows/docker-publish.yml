name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/omnilux-tv/omnilux

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Check out deploy repo
        uses: actions/checkout@v4
        with:
          path: omnilux-deploy

      - name: Check out product repo
        uses: actions/checkout@v4
        with:
          repository: omnilux-tv/omnilux
          path: omnilux

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble build context
        run: |
          rsync -a --delete omnilux/ build-context/
          rsync -a --delete omnilux-deploy/docker/ build-context/docker/
          rsync -a --delete omnilux-deploy/deploy/ build-context/deploy/
          rsync -a --delete omnilux-deploy/scripts/ build-context/scripts/
          cp omnilux-deploy/docker-compose.truenas.yml build-context/docker-compose.truenas.yml

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build runtime image for verification
        uses: docker/build-push-action@v6
        with:
          context: build-context
          file: build-context/docker/Dockerfile.server
          load: true
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          tags: omnilux-runtime-verify:latest

      - name: Verify runtime image excludes app source
        run: |
          docker run --rm --entrypoint sh omnilux-runtime-verify:latest -lc '
            set -eu
            [ -d /app/migrations ]
            [ ! -d /app/apps/server/src ]
            [ ! -d /app/apps/web/src ]
            [ -z "$(find /app/packages/plugin-sdk/dist -type f \( -name "*.d.ts" -o -name "*.d.ts.map" \) -print)" ]
            leaked=$(find /app/apps /app/packages \
              -path /app/apps/server/dist -prune -o \
              -path /app/apps/web/.output -prune -o \
              -path /app/packages/plugin-sdk/dist -prune -o \
              -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.mts" -o -name "*.cts" \) -print)
            [ -z "$leaked" ]
            [ -z "$(grep -R "/build/apps/web/src" /app/apps/web/.output/server 2>/dev/null)" ]
          '

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: build-context
          file: build-context/docker/Dockerfile.server
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
